<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Agente Personal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --accent: #6d5aff;
      --accent2: #ff5fad;
      --accent-glow: rgba(109,90,255,0.35);
      --text: #f0f0f8;
      --text-dim: #888899;
      --user-bubble: #6d5aff;
      --bot-bubble: #18181f;
      --radius: 20px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
      position: relative;
    }

    .header {
      flex-shrink: 0;
      padding: 14px 18px 12px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: conic-gradient(from 180deg at 50% 50%, #6d5aff 0deg, #ff5fad 120deg, #ffb86c 240deg, #6d5aff 360deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 0 1px rgba(109,90,255,0.3), 0 4px 16px rgba(109,90,255,0.25);
      flex-shrink: 0;
    }

    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .header-info p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 999px;
      font-size: 11px;
      color: #22c55e;
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 8px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(109,90,255,0.3); border-radius: 999px; }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60%;
      text-align: center;
      padding: 20px;
      gap: 10px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: conic-gradient(from 180deg at 50% 50%, #6d5aff 0deg, #ff5fad 120deg, #ffb86c 240deg, #6d5aff 360deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 40px rgba(109,90,255,0.3);
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, #6d5aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 260px;
      line-height: 1.5;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      padding: 7px 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover, .chip:active {
      background: rgba(109,90,255,0.15);
      border-color: rgba(109,90,255,0.4);
      color: var(--text);
    }

    .msg {
      display: flex;
      margin-bottom: 10px;
      animation: msgIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.user { justify-content: flex-end; }
    .msg.bot  { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 10px 13px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      overflow-wrap: break-word;
      position: relative;
    }

    .bubble.user {
      background: linear-gradient(135deg, #6d5aff, #9b5de5);
      border-radius: 18px 18px 4px 18px;
      color: #fff;
      box-shadow: 0 4px 18px rgba(109,90,255,0.35);
    }

    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      color: var(--text);
    }

    .bubble .sender {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 3px;
    }

    .bubble .img-preview {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 6px;
      display: block;
    }

    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .input-area {
      flex-shrink: 0;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      padding-bottom: calc(10px + var(--safe-bottom));
    }

    .img-attach-preview {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: rgba(109,90,255,0.1);
      border: 1px solid rgba(109,90,255,0.25);
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #a89bff;
    }

    .img-attach-preview.visible { display: flex; }

    .img-attach-preview img {
      width: 36px; height: 36px;
      border-radius: 6px;
      object-fit: cover;
    }

    .img-attach-preview span { flex: 1; }

    .remove-img {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      box-shadow: none;
      display: flex;
      align-items: center;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 6px 6px 12px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: rgba(109,90,255,0.5);
      box-shadow: 0 0 0 3px rgba(109,90,255,0.1);
    }

    #message {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
      padding: 4px 0;
    }

    #message::placeholder { color: var(--text-dim); }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.18s;
      padding: 0;
      box-shadow: none;
    }

    .icon-btn:hover, .icon-btn:active {
      background: rgba(109,90,255,0.15);
      color: var(--accent);
    }

    #image { display: none; }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 11px;
      background: linear-gradient(135deg, #6d5aff, #9b5de5);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.18s;
      padding: 0;
      box-shadow: 0 4px 12px rgba(109,90,255,0.4);
      flex-shrink: 0;
    }

    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .extra-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
      margin-bottom: 0;
    }

    .extra-panel.open {
      max-height: 80px;
      margin-bottom: 8px;
    }

    #extra {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }

    #extra:focus { border-color: rgba(109,90,255,0.5); }
    #extra::placeholder { color: var(--text-dim); }

    .hint-bar {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 7px;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .hint-item:hover { color: var(--accent); }
    .hint-item.active { color: #a89bff; }

    @media (min-width: 680px) {
      .app {
        height: calc(100vh - 32px);
        margin: 16px auto;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      }
      html, body { align-items: center; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h1>Agente Personal</h1>
        <p>GPT-4.1 · Texto, datos e imágenes</p>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>¿En qué te ayudo?</h2>
      <p>Puedo responder preguntas, analizar imágenes y procesar datos</p>
      <div class="welcome-chips">
        <div class="chip" onclick="setMsg('Explícame algo complejo de forma sencilla')">💡 Explicar algo</div>
        <div class="chip" onclick="setMsg('Analiza esta imagen:')">🖼️ Analizar imagen</div>
        <div class="chip" onclick="setMsg('Resume los siguientes datos:')">📊 Resumir datos</div>
        <div class="chip" onclick="setMsg('¿Puedes ayudarme con esto?')">🙋 Pedir ayuda</div>
      </div>
    </div>
  </div>

  <div class="input-area">

    <div class="img-attach-preview" id="imgPreview">
      <img id="imgThumb" src="" alt="preview" />
      <span id="imgName">imagen.jpg</span>
      <button class="remove-img" onclick="removeImage()">✕</button>
    </div>

    <div class="extra-panel" id="extraPanel">
      <input id="extra" type="text" placeholder="Datos adicionales (JSON, texto, etc.)" />
    </div>

    <div class="input-row">
      <textarea
        id="message"
        rows="1"
        placeholder="Escribe un mensaje…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <div class="input-actions">
        <label class="icon-btn" title="Adjuntar imagen">
          📎
          <input type="file" id="image" accept="image/*" onchange="handleImage(event)" />
        </label>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <div class="hint-bar">
      <div class="hint-item" id="extraToggle" onclick="toggleExtra()">
        <span>⊞</span> Datos extra
      </div>
      <div class="hint-item" style="cursor:default; pointer-events:none;">
        <span>↵</span> Shift+Enter para nueva línea
      </div>
    </div>

  </div>
</div>

<script>
  let imageBase64 = null;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function setMsg(text) {
    const el = document.getElementById('message');
    el.value = text;
    el.focus();
    autoResize(el);
  }

  function toggleExtra() {
    document.getElementById('extraPanel').classList.toggle('open');
    document.getElementById('extraToggle').classList.toggle('active');
  }

  function handleImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      imageBase64 = e.target.result;
      document.getElementById('imgThumb').src = imageBase64;
      document.getElementById('imgName').textContent = file.name;
      document.getElementById('imgPreview').classList.add('visible');
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    imageBase64 = null;
    document.getElementById('imgPreview').classList.remove('visible');
    document.getElementById('imgThumb').src = '';
    document.getElementById('image').value = '';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function appendMessage(role, content, imgSrc = null) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.classList.add('msg', role);

    const bubble = document.createElement('div');
    bubble.classList.add('bubble', role);

    const sender = document.createElement('div');
    sender.classList.add('sender');
    sender.textContent = role === 'user' ? 'Tú' : 'Agente';
    bubble.appendChild(sender);

    if (content) {
      const text = document.createElement('div');
      text.textContent = content;
      bubble.appendChild(text);
    }

    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      img.classList.add('img-preview');
      bubble.appendChild(img);
    }

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.classList.add('msg', 'bot');
    wrapper.id = 'typing-indicator';
    wrapper.innerHTML = `
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const msgEl = document.getElementById('message');
    const extraEl = document.getElementById('extra');
    const sendBtn = document.getElementById('sendBtn');

    const message = msgEl.value.trim();
    const extra = extraEl.value.trim();
    if (!message && !imageBase64) return;

    appendMessage('user', message, imageBase64);
    msgEl.value = '';
    msgEl.style.height = 'auto';
    const sentImg = imageBase64;
    removeImage();

    sendBtn.disabled = true;
    showTyping();

    try {
      let data = null;
      if (extra) {
        try { data = JSON.parse(extra); } catch { data = extra; }
      }

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, data, imageBase64: sentImg })
      });

      const json = await res.json();
      hideTyping();
      appendMessage('bot', json.reply || ('⚠️ ' + json.error));

    } catch (err) {
      hideTyping();
      appendMessage('bot', '⚠️ Error de conexión. Intenta de nuevo.');
    }

    sendBtn.disabled = false;
    msgEl.focus();
  }
</script>
</body>
</html>
