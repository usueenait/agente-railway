<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi Agente</title>
  <!-- Importante para móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #222 0, #111 45%, #050505 100%);
      color: #f5f5f5;
      height: 100vh;
      display: flex;
      align-items: stretch; /* mejor para móvil */
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      height: 100vh;              /* ocupa toda la altura */
      max-height: 900px;          /* tope en escritorio grande */
      background: #151518;
      border-radius: 0;           /* sin bordes en móvil */
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    @media (min-width: 768px) {
      .container {
        margin: 20px;
        height: calc(100vh - 40px);
        border-radius: 20px;
      }
    }

    .header {
      padding: 14px 16px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #fff 0, #ffd54f 15%, #f97316 40%, #7c3aed 100%);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.85;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.7);
      margin-right: 6px;
    }

    .status {
      display: flex;
      align-items: center;
      font-size: 12px;
      opacity: 0.9;
    }

    #chat {
      flex: 1;
      padding: 10px 10px 12px;
      overflow-y: auto;
      background: radial-gradient(circle at top left, #1f2937 0, #020617 60%);
    }

    .msg {
      margin-bottom: 10px;
      display: flex;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .msg.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 80%;
      padding: 8px 10px;
      border-radius: 14px;
      line-height: 1.4;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .bubble.user {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-bottom-left-radius: 4px;
    }

    .bubble small {
      display: block;
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 2px;
    }

    .input-area {
      padding: 8px 10px;
      background: #020617;
      border-top: 1px solid rgba(148, 163, 184, 0.3);
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    #message, #extra {
      flex: 1;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15,23,42,0.95);
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
    }

    #message::placeholder, #extra::placeholder {
      color: #6b7280;
    }

    #message:focus, #extra:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.3);
    }

    #image {
      flex: 1;
      font-size: 12px;
      color: #e5e7eb;
    }

    button {
      padding: 0 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
      white-space: nowrap;
    }

    button:hover {
      filter: brightness(1.07);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.5);
    }

    .send-icon {
      font-size: 16px;
    }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      text-align: right;
      padding-right: 4px;
    }
